url: https://drosenman.github.io/orbitr/

template:
  bootstrap: 5
  bootswatch: cosmo

navbar:
  structure:
    left:  [intro, reference, articles]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/DRosenman/orbitr

articles:
  - title: "Getting Started"
    navbar: "Getting Started"
    contents:
      - quick-start
      - examples
      - physical-constants

  - title: "Visualization"
    navbar: "Visualization"
    contents:
      - plotting-3d
      - custom-visualization

  - title: "Understanding the Simulation"
    navbar: "Understanding the Simulation"
    contents:
      - the-physics
      - reference-frames
      - unstable-orbits

reference:
  - title: "System Setup"
    desc: "Create a simulation and add bodies"
    contents:
      - create_system
      - add_body

  - title: "Simulation"
    desc: "Run the N-body simulation"
    contents:
      - simulate_system

  - title: "Analysis & Visualization"
    desc: "Transform and plot results"
    contents:
      - shift_reference_frame
      - plot_orbits
      - plot_orbits_3d

  - title: "Physical Constants"
    desc: "Built-in masses, distances, and orbital speeds"
    contents:
      - physical_constants
