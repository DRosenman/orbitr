url: https://orbit-r.com/

template:
  bootstrap: 5
  bootswatch: cosmo

navbar:
  structure:
    left:  [intro, get-started, reference, articles, demo]
    right: [search, github]
  components:
    get-started:
      text: Get Started
      href: articles/quick-start.html
    demo:
      text: Interactive Demo
      href: https://daverosenman.shinyapps.io/orbitr/
    github:
      icon: fa-github
      href: https://github.com/DRosenman/orbitr
      aria-label: GitHub repository

articles:
  - title: internal
    contents:
      - quick-start

  - title: "Getting Started"
    navbar: "Getting Started"
    contents:
      - building-two-body-orbits
      - keplerian-elements
      - examples
      - physical-constants

  - title: "Visualization"
    navbar: "Visualization"
    contents:
      - plotting-3d
      - custom-visualization

  - title: "Understanding the Simulation"
    navbar: "Understanding the Simulation"
    contents:
      - the-physics
      - reference-frames
      - unstable-orbits

  - title: "Roadmap"
    navbar: "Roadmap"
    contents:
      - roadmap

  - title: "Resources"
    navbar: "Resources"
    contents:
      - further-reading

reference:
  - title: "System Setup"
    desc: "Create a simulation and add bodies"
    contents:
      - create_system
      - add_sun
      - add_body
      - add_body_keplerian
      - add_planet
      - load_solar_system

  - title: "Simulation"
    desc: "Run the N-body simulation"
    contents:
      - simulate_system

  - title: "Analysis & Visualization"
    desc: "Transform and plot results"
    contents:
      - shift_reference_frame
      - plot_orbits
      - plot_orbits_3d
      - plot_system
      - plot_system_3d
      - animate_system
      - animate_system_3d

  - title: "Physical Constants"
    desc: "Built-in masses, distances, and orbital speeds"
    contents:
      - physical_constants
